<!doctype html>
<html lang="en">

<head>
	<!-- Required meta tags -->
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">

	<title>Earthquake Map</title>
</head>

<body class="container-fluid p-5 ">
	<h1>USGS Earthquake Data</h1>
	<p class="mb-3">This map displays earthquake activity using proportional symbols. Each circle represents an earthquake, and circle size is scaled based on magnitude. Larger circles indicate stronger earthquakes.</p>

	<div id="map" class="w-100" style="height: 500px;"></div>


	<!--  Leaflet JS -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
		
<script>
	const map = L.map('map').setView([37, -95], 4);

	L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
		attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
	}).addTo(map);

	fetch('earthquakes.json')
		.then(response => response.json())
		.then(data => {
			data.forEach(eq => {
  if (eq.mag >= 1.5) {
    L.circle([eq.lat, eq.lon], {
      color: 'red',
      fillColor: '#ff5733',
      fillOpacity: 0.5,
      radius: eq.mag * 30000
    })
    .addTo(map)
    .bindPopup(`Magnitude: ${eq.mag}<br>Lat: ${eq.lat}<br>Lon: ${eq.lon}`);
  }
});
		});
</script>

</body>

</html>
