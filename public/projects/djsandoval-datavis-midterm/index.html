<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  h1 {
    font-family: 'Poppins', sans-serif; /* my heading font */
    font-weight: 600;
  }

  p {
    font-family: 'Poppins', sans-serif; /* sub heading font */
  }
</style>

  <title>Energy vs Popularity</title> <!-- browser tab title -->
</head>

<body class="container px-0 py-3">
  <h1>Energy vs Popularity by Genre</h1>
  <p class="lead mb-5">
    This scatter plot shows the relationship between Spotify song energy and popularity.
    Each point represents one song, colored by genre.
  </p>

  <canvas id="scatterChart"></canvas> <!-- canvas where chart is drawn -->

  <!--  Chart JS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>

  <script>

    const palette = [
      '#FF0000','#FD6C0F','#FFE713','#38BB00','#0016DF','#53BAFF','#9C2EB0','#FF55B0','#965200','#000000'
    ]; // rainbow color pallete from colormind.io

    function buildColorMap(genres) { // assigns my genres their own color
      const map = new Map(); // builds map to store genre and color
      genres.forEach((g, i) => {
        map.set(g, palette[i % palette.length]); // cycle thru pallet colors
      });
      return map; 
    }

    fetch('./spotify_clean.json') // load cleaned data
      .then(res => res.json()) // change response to json
      .then(rows => createChart(rows)) // send data to chart func 
      .catch(error => console.log(error)) // print err if occurs

    function groupBy(arr, key) { // group rows by genre
      const m = new Map(); // create map to store genre and songs
      for (const d of arr) {
        const k = d[key]; // get genre value
        if (!m.has(k)) m.set(k, []); // new arr if genere not seen
        m.get(k).push(d); // add song to genre arr
      }
      return m;
    }

    function createChart(rows) { // create chart with data

      Chart.defaults.font.family = 'Lato'; // set default font for chart
      Chart.defaults.font.size = 13; // set default font size for chart

      const sampled = [...rows] // copy data arr
        .sort(() => Math.random() - 0.5) // shuff rows randomly
        .slice(0, 2500); // keep 2500 songs for plotting

      const byGenre = groupBy(sampled, 'track_genre'); // group songs by genre 

      const colorMap = buildColorMap([...byGenre.keys()]); // assign colors to genres

      const datasets = Array.from(byGenre.entries()).map(([genre, items]) => ({ // create data sets for each genre
        label: items[0].genre_display || genre, // legend label
        data: items.map(d => ({ // convert songs to points
          x: d.energy, // x
          y: d.popularity, // y
          meta: d // store song info for tooltip
        })),
        backgroundColor: colorMap.get(genre), // point color
        pointRadius: 2.5, // point size
        pointHoverRadius: 5 // size when hovered
      }));

      const dataConfig = {
        datasets: datasets // add all genre datasets to chart data
      };

      const config = {
        type: 'scatter', // plot type
        data: dataConfig,
        options: {
          plugins: {
            legend: true, // show legend
            tooltip: {
              callbacks: {
                label: function (ctx) { // tooltip content
                  const m = ctx.raw.meta; // get song info from point
                  return `${m.track_name} - ${m.artists} | Pop ${m.popularity}, Energy ${m.energy}`; // show song info
                }
              }
            }
          },
scales: {
  x: {
    min: 0,
    max: 1, // energy is between 0 and 1
    title: {
      display: true,
      text: 'Energy (0 to 1)', // x axis title
      color: '#222',
      font: {
        size: 16,
        weight: '600'
      }
    },
    ticks: {
      color: '#222', // darker tick color 
      font: {
        size: 13,
        weight: '500'
      }
    },
    grid: {
      color: 'rgba(0,0,0,0.1)' // lighter grid lines, black too dark
    }
  },
  y: {
    min: 0,
    max: 100, // popularity is between 0 and 100
    title: {
      display: true,
      text: 'Popularity (0 to 100)', // y axis title
      color: '#222',
      font: {
        size: 16,
        weight: '600'
      }
    },
    ticks: {
      color: '#222', // dark ticks again 
      font: {
        size: 13,
        weight: '500'
      }
    },
    grid: {
      color: 'rgba(0,0,0,0.1)'
    }
  }
}
        },
      };

      const ctx = document.getElementById("scatterChart").getContext("2d") // get canvas context to draw chart
      let chart = new Chart(
        ctx,
        config
      );

    }

  </script>

</body>
</html>
